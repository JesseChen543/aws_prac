<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AWS SAA-C03">
  <title>AWS SAA-C03 Quiz</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-title">&#9729;&#65039; AWS SAA-C03</div>
    <button class="icon-btn" onclick="window.location.href='settings.html'" title="Settings">&#9881;&#65039;</button>
  </div>

  <!-- Summary stats -->
  <div class="home-hero">
    <div class="home-sub">Practice Quiz &mdash; tap a category to begin</div>
  </div>
  <div class="home-stats">
    <div class="hstat">
      <div class="hstat-num" id="hs-total">0</div>
      <div class="hstat-label">Questions</div>
    </div>
    <div class="hstat">
      <div class="hstat-num correct" id="hs-correct">0</div>
      <div class="hstat-label">Correct</div>
    </div>
    <div class="hstat">
      <div class="hstat-num wrong" id="hs-wrong">0</div>
      <div class="hstat-label">Wrong</div>
    </div>
  </div>

  <!-- Quick review actions -->
  <div class="section-label">Quick Review</div>
  <div class="quick-actions">
    <button class="quick-btn quick-btn-wrong" id="qa-wrong" onclick="window.location.href='quiz.html?mode=wrong'" disabled>
      <span class="qa-icon">&#10007;</span>
      <span class="qa-count" id="qa-wrong-count">0</span>
      <span class="qa-label">Wrong</span>
    </button>
    <button class="quick-btn quick-btn-flag" id="qa-flag" onclick="window.location.href='quiz.html?mode=flagged'" disabled>
      <span class="qa-icon">&#128681;</span>
      <span class="qa-count" id="qa-flag-count">0</span>
      <span class="qa-label">Flagged</span>
    </button>
  </div>

  <!-- Category list -->
  <div class="section-label">Categories</div>
  <div class="categories-list" id="categories-list"></div>

  <script src="js/questions-data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
